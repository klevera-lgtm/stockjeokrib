name: Daily Portfolio Condition Check

on:
  schedule:
    # 미국 장 마감(ET 16:00) 후 약 2시간 뒤 실행 → UTC 22:00 = 한국 07:00
    - cron: "0 22 * * 1-5"
  workflow_dispatch: # 수동 실행 지원

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run condition check
        run: node scripts/check-conditions.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 스마트 발송 연동 시 아래 두 줄 추가
          # SMART_MSG_API: ${{ secrets.SMART_MSG_API }}
          # SMART_MSG_TOKEN: ${{ secrets.SMART_MSG_TOKEN }}
