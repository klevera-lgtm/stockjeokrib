name: Weekly Dividend Data Update

on:
  schedule:
    # 매주 월요일 KST 07:20 = UTC 일요일 22:20
    - cron: "20 22 * * 0"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch dividends + raw prices
        run: python scripts/fetch_dividends.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dividends data/prices_raw
          git diff --cached --quiet || git commit -m "chore: update dividend data [$(date '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push
