name: Weekly Combo Recompute

on:
  schedule:
    # 매주 월요일 KST 07:00 = UTC 일요일 22:00
    - cron: "0 22 * * 0"
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Compute featured combos
        run: node scripts/compute-combos.mjs

      - name: Commit updated combos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/featuredCombos.json data/supportedTickers.json
          git diff --cached --quiet || git commit -m "chore: update featured combos [$(date '+%Y-%m-%d')]"
          git push
